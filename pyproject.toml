[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "quantarhei"
version = "0.0.68"
description = "Quantarhei: Open Quantum System Theory for Molecular Systems"
readme = "README.rst"
license = { text = "MIT" }
authors = [
  { name = "Tomas Mancal", email = "mancal@karlov.mff.cuni.cz" }
]
keywords = [
  "physics",
  "chemistry",
  "quantum mechanics",
  "open quantum systems",
  "spectroscopy",
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Science/Research",
  "Intended Audience :: Education",
  "Topic :: Scientific/Engineering :: Physics",
  "Topic :: Scientific/Engineering :: Chemistry",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
]
requires-python = ">=3.10"
dependencies = [
  "numpy>=1.24",
  "scipy>=1.9",
  "matplotlib>=3.5",
  "dill>=0.3.6",
  "terminaltables>=3.1",
  "gherkin-official>=4.1,<5",
  "pyyaml>=6.0",
  "packaging>=21.0",
]

[project.urls]
Homepage = "https://github.com/tmancal74/quantarhei"

[project.scripts]
qrhei = "quantarhei.scripts.qrhei:main"
ghenerate = "quantarhei.scripts.ghenerate:main"
qtask = "quantarhei.scripts.qtask:main"
qview = "quantarhei.scripts.qview:main"
qlaunch = "quantarhei.scripts.qlaunch:main"
qtest = "quantarhei.scripts.qtest:main"

[tool.pytest.ini_options]
testpaths = ["tests/unit"]
addopts = "-v --tb=short"
doctest_optionflags = ["NORMALIZE_WHITESPACE", "ELLIPSIS"]

[tool.setuptools.packages.find]
exclude = ["contrib", "docs", "tests"]

[tool.setuptools.package-data]
quantarhei = [
  "py.typed",
  "testing/resources/behave/*.feature",
  "wizard/examples/*.py",
  "wizard/examples/*.yaml",
  "wizard/examples/*.pdb",
  "wizard/examples/*.ipynb",
]
