name: Quantarhei

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: astral-sh/setup-uv@v5
      with:
        python-version: "3.12"
    - name: Check PR title
      if: github.event_name == 'pull_request'
      run: |
        TITLE="${{ github.event.pull_request.title }}"
        echo "PR title: $TITLE"
        echo "$TITLE" | grep -qE '^#[0-9]+ ' || \
          { echo "PR title must start with '#N ' (e.g. '#243 ci: add feature')"; exit 1; }
    - name: Install dev dependencies
      run: uv sync --extra dev
    - name: Check formatting
      run: uv run ruff format --check .
    - name: Run pre-commit hooks
      run: uv run pre-commit run --all-files

  build:
    runs-on: ubuntu-latest
    permissions:
      checks: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    - uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Run unit tests
      run: |
        uv run pytest -v \
          --cov=quantarhei \
          --cov-report=term \
          --cov-report=xml:coverage1.xml \
          --junit-xml=results-unit.xml \
          tests/unit

    - name: Run doc tests
      run: |
        uv run pytest --doctest-modules -v \
          --cov=quantarhei \
          --cov-append \
          --cov-report=xml:coverage2.xml \
          --junit-xml=results-doctest.xml \
          quantarhei/core \
          quantarhei/builders \
          quantarhei/qm/corfunctions \
          quantarhei/spectroscopy \
          quantarhei/qm/liouvillespace \
          quantarhei/functions \
          quantarhei/qm/hilbertspace \
          quantarhei/qm/propagators \
          quantarhei/qm/propagators/poppropagator.py

    - name: Run behave tests
      run: |
        uv run coverage run --data-file=.coverage.behave $(uv run which behave) tests/behave/features
        # .coveragerc has parallel=True so coverage run writes .coverage.behave.<host>.<pid>;
        # combine merges those files back into .coverage.behave before xml export.
        uv run coverage combine --data-file=.coverage.behave
        uv run coverage xml --data-file=.coverage.behave -o coverage3.xml

    - name: Test report
      uses: dorny/test-reporter@v1
      if: always()
      # Fork PRs get a read-only token; the check-run write will 403 —
      # continue-on-error prevents that from blocking the job.
      continue-on-error: true
      with:
        name: Test Results (Python ${{ matrix.python-version }})
        path: results-*.xml
        reporter: java-junit

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        fail_ci_if_error: true
        files: ./coverage1.xml,./coverage2.xml,./coverage3.xml
        token: ${{ secrets.CODECOV_TOKEN }}
        verbose: true

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - uses: actions/checkout@v4
    - uses: actions/dependency-review-action@v4
