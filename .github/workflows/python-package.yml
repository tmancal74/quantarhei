name: Quantarhei

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
    - name: Check PR title
      if: github.event_name == 'pull_request'
      run: |
        TITLE="${{ github.event.pull_request.title }}"
        echo "PR title: $TITLE"
        echo "$TITLE" | grep -qE '^#[0-9]+ ' || \
          { echo "PR title must start with '#N ' (e.g. '#243 ci: add feature')"; exit 1; }
    - name: Install pre-commit
      run: pip install pre-commit
    - name: Run pre-commit hooks
      run: pre-commit run --all-files

  build:
    runs-on: ubuntu-latest
    permissions:
      checks: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt -r requirements_devel.txt
        pip install -e .

    - name: Run unit tests
      run: |
        pytest -v \
          --cov=quantarhei \
          --cov-report=term \
          --cov-report=xml:coverage1.xml \
          --junit-xml=results-unit.xml \
          tests/unit

    - name: Run doc tests
      run: |
        pytest --doctest-modules -v \
          --cov=quantarhei \
          --cov-append \
          --cov-report=xml:coverage2.xml \
          --junit-xml=results-doctest.xml \
          quantarhei/core \
          quantarhei/builders \
          quantarhei/qm/corfunctions \
          quantarhei/spectroscopy \
          quantarhei/qm/liouvillespace \
          quantarhei/functions \
          quantarhei/qm/hilbertspace \
          quantarhei/qm/propagators \
          quantarhei/qm/propagators/poppropagator.py

    - name: Run behave tests
      run: |
        coverage run --data-file=.coverage.behave $(which behave) tests/behave/features
        coverage xml --data-file=.coverage.behave -o coverage3.xml

    - name: Test report
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Test Results (Python ${{ matrix.python-version }})
        path: results-*.xml
        reporter: java-junit

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        fail_ci_if_error: true
        files: ./coverage1.xml,./coverage2.xml,./coverage3.xml
        token: ${{ secrets.CODECOV_TOKEN }}
        verbose: true

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - uses: actions/checkout@v4
    - uses: actions/dependency-review-action@v4
